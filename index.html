<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文筆順與部首學習網 - SEN 友善版</title>
    <!-- 引入 Tailwind CSS 作為版面設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Hanzi Writer 筆順核心庫 -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fcfaf2; 
            transition: background-color 0.5s, background-image 0.5s;
        }
        .bg-pattern {
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
        }
        .kaishu {
            font-family: 'KaiTi', 'BiauKai', 'DFKai-SB', 'STKaiti', serif; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 互動與震動動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes starPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.5) rotate(15deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .star-animate { animation: starPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* 視覺化引入 (模擬 GIF 動畫) */
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .anim-float { animation: floatAnim 2s ease-in-out infinite; }
        
        @keyframes pulseAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .anim-pulse { animation: pulseAnim 1.5s ease-in-out infinite; }
        
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .anim-spin-slow { animation: spinSlow 8s linear infinite; }

        @keyframes bounceSide {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(15px); }
        }
        .anim-bounce-side { animation: bounceSide 2s ease-in-out infinite; }

        /* 🌟 新增：閃爍光澤動畫 (進度條使用) */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .intro-card-bg {
            background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
        }
        
        .formula-card {
            background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 10px, #ffffff 10px, #ffffff 20px);
        }

        .lego-block {
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
            border-radius: 4px;
            position: relative;
        }
        .lego-block::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 4px;
            background: inherit;
            border-radius: 2px 2px 0 0;
            filter: brightness(1.1);
        }

        /* 🌟 感官友善 / 專注模式樣式 (Sensory-Friendly Mode) 🌟 */
        body.focus-mode {
            background-color: #f3f4f6; /* 柔和暗灰底色 */
        }
        body.focus-mode .bg-pattern {
            background-image: none !important; /* 移除花紋背景 */
        }
        body.focus-mode .intro-card-bg {
            background: #ffffff !important; /* 移除漸層 */
            border-color: #e5e7eb !important;
        }
        /* 關閉所有干擾動畫 */
        body.focus-mode .anim-float, 
        body.focus-mode .anim-pulse, 
        body.focus-mode .anim-bounce-side, 
        body.focus-mode .anim-spin-slow {
            animation: none !important;
            transform: none !important;
        }
    </style>
</head>
<body class="text-gray-800 flex flex-col lg:flex-row h-[100dvh] overflow-hidden bg-pattern" onclick="initAudio()">

    <!-- 左側邊欄 -->
    <div class="w-full lg:w-72 bg-white shadow-xl flex flex-col z-10 lg:h-full border-b lg:border-r lg:border-b-0 border-gray-200 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-amber-700 text-white shadow-md relative flex flex-col gap-2">
            <div class="flex justify-between items-center w-full">
                <h1 class="text-xl font-bold tracking-widest text-center flex-1">詞彙遊樂園</h1>
                <div class="flex gap-2">
                    <button id="focus-toggle" onclick="toggleFocusMode(event)" class="text-sm px-2 py-1 bg-white/20 hover:bg-white/40 rounded-lg transition-all font-bold tracking-wide border border-white/30 text-white" title="開啟專注模式">🎮 遊戲</button>
                    <button id="sound-toggle" onclick="toggleSound(event)" class="text-2xl hover:scale-110 transition-transform focus:outline-none" title="音效開關">🔊</button>
                </div>
            </div>
        </div>
        
        <!-- 🌟 字詞難度分類器 -->
        <div class="flex gap-1 p-2 bg-amber-50 text-sm font-bold border-b border-amber-100 shadow-inner justify-around">
            <button onclick="filterDifficulty('all', this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-amber-900 bg-amber-200 shadow-sm border border-amber-300 transition-all">全部</button>
            <button onclick="filterDifficulty(1, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐初階</button>
            <button onclick="filterDifficulty(2, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐⭐中階</button>
            <button onclick="filterDifficulty(3, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐⭐⭐挑戰</button>
        </div>

        <ul id="word-list" class="flex flex-row lg:flex-col overflow-x-auto lg:overflow-y-auto no-scrollbar p-2 lg:p-3 gap-2 bg-[#faf8ec] lg:flex-1">
            <!-- 詞語列表將由 JS 注入 -->
        </ul>
    </div>

    <!-- 右側主內容區 -->
    <div class="flex-1 flex flex-col items-center p-4 lg:p-8 overflow-y-auto relative">
        
        <!-- 🌟 升級版頂部：星星分數、連擊徽章與視覺化進度條 -->
        <div class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="w-full md:w-2/3 flex flex-col gap-2">
                <div class="flex justify-between items-end px-1">
                    <div class="bg-yellow-100 border-2 border-yellow-400 rounded-full px-5 py-1.5 shadow-sm flex items-center gap-2">
                        <span class="text-2xl filter drop-shadow-sm">⭐</span>
                        <span class="font-bold text-yellow-700 text-xl tracking-wide">星星收集：<span id="score-display">0 / 134</span></span>
                    </div>
                    <!-- 🌟 微型獎勵：動態連擊徽章 -->
                    <div id="combo-badge" class="hidden font-black text-white bg-gradient-to-r from-red-500 to-orange-500 px-4 py-1 rounded-full shadow-md transform rotate-2 z-50 text-xl border-2 border-white transition-all duration-300">
                        🔥 <span id="combo-count">2</span> 連擊！
                    </div>
                </div>
                <!-- 🌟 視覺化進度條 -->
                <div class="w-full bg-white/80 rounded-full h-4 shadow-inner border border-yellow-200 overflow-hidden relative">
                    <div id="score-progress-bar" class="bg-gradient-to-r from-yellow-300 to-yellow-500 h-full rounded-full transition-all duration-700 ease-out relative" style="width: 0%">
                        <div class="absolute top-0 left-0 bottom-0 right-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
                    </div>
                </div>
            </div>
            
            <div id="cheer-badge" class="hidden font-bold text-white bg-gradient-to-r from-orange-400 to-red-500 px-6 py-2 rounded-full shadow-lg transform -rotate-3 z-50 text-2xl">
                太神啦！🔥
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 階段一：視覺化情境引入區 -->
        <!-- ========================================== -->
        <div id="intro-section" class="w-full max-w-3xl mt-8 flex flex-col items-center justify-center fade-in-up">
            <div class="intro-card-bg border-4 border-teal-200 rounded-3xl p-8 shadow-xl w-full flex flex-col items-center text-center relative overflow-hidden transition-colors">
                <span class="absolute top-4 left-4 bg-teal-500 text-white px-3 py-1 rounded-full font-bold text-sm shadow-sm tracking-widest">情境猜一猜</span>
                
                <div id="intro-visual" class="text-8xl md:text-9xl my-8 filter drop-shadow-xl anim-pulse">
                </div>
                
                <div id="intro-context" class="text-2xl md:text-3xl text-gray-700 font-bold leading-relaxed mb-6">
                </div>
                
                <div id="intro-question" class="text-xl md:text-2xl text-teal-800 font-bold bg-white/70 px-6 py-4 rounded-2xl border border-teal-100 shadow-sm mb-8 w-full">
                </div>
                
                <button onclick="revealWord()" class="bg-gradient-to-b from-amber-400 to-amber-600 hover:from-amber-500 hover:to-amber-700 text-white text-2xl font-bold py-4 px-10 rounded-full shadow-lg transform transition-transform hover:scale-105 active:scale-95 flex items-center gap-2">
                    <span>💡</span> 揭曉答案並學寫字
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 階段二：正式學習區 -->
        <!-- ========================================== -->
        <div id="learning-section" class="w-full flex flex-col items-center hidden fade-in-up max-w-6xl pb-10">
            
            <div class="mb-6 mt-2 w-full flex flex-col items-center">
                <div id="word-display" class="text-6xl md:text-8xl kaishu flex space-x-3 md:space-x-6 justify-center flex-wrap gap-y-4 text-gray-800">
                </div>
                <div class="text-gray-500 mt-3 font-bold tracking-widest bg-white/80 px-4 py-1 rounded-full border border-gray-200 shadow-sm">👆 點擊上方單字來切換學習</div>
            </div>

            <!-- 第一區：單字特訓 -->
            <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-xl p-5 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-6 lg:gap-8 w-full border-4 border-amber-100/50 mb-8 transition-colors">
                
                <div class="flex flex-col items-center justify-start flex-shrink-0">
                    <div class="relative w-[280px] h-[280px] md:w-[320px] md:h-[320px] bg-white border-4 border-amber-700 rounded-xl shadow-md overflow-hidden" id="canvas-container">
                        <div class="absolute inset-0 pointer-events-none opacity-50">
                            <div class="w-full h-full border-b-2 border-dashed border-amber-300 absolute top-1/2 transform -translate-y-1/2"></div>
                            <div class="w-full h-full border-r-2 border-dashed border-amber-300 absolute left-1/2 transform -translate-x-1/2"></div>
                            <div class="w-full h-full absolute border-b-2 border-dashed border-amber-300 transform rotate-45 scale-150 origin-center"></div>
                            <div class="w-full h-full absolute border-b-2 border-dashed border-amber-300 transform -rotate-45 scale-150 origin-center"></div>
                        </div>
                        <div id="character-canvas" class="absolute inset-0 z-10 cursor-pointer" style="touch-action: none;" title="點擊田字格進行書寫測驗！"></div>
                        
                        <div id="success-animation" class="absolute inset-0 z-20 pointer-events-none flex items-center justify-center hidden">
                            <span class="text-8xl filter drop-shadow-lg">🌟</span>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-center gap-4 w-full">
                        <button onclick="playAnimation()" class="px-6 py-3 md:px-6 md:py-4 bg-amber-600 hover:bg-amber-700 text-white rounded-full shadow-md transition-transform active:scale-95 font-bold text-xl flex items-center gap-2 focus:outline-none">
                            ▶️ 播放
                        </button>
                        <button onclick="startQuiz()" class="px-6 py-3 md:px-6 md:py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-full shadow-md transition-transform active:scale-95 font-bold text-xl flex items-center gap-2 relative overflow-hidden group focus:outline-none">
                            <span class="relative z-10 flex items-center">✍️ 自己寫 <span class="ml-2 text-sm bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full font-extrabold border border-yellow-500 shadow-sm leading-none">⭐ 2分</span></span>
                        </button>
                    </div>
                </div>

                <div class="flex-1 w-full flex flex-col" id="right-info-panel">
                    <div class="flex items-center gap-3 border-b-4 border-amber-200 pb-3 mb-5">
                        <span class="text-4xl">🕵️</span>
                        <h2 class="text-3xl font-bold text-amber-900 tracking-wide">字形密碼戰</h2>
                    </div>
                    
                    <div class="bg-[#fffdf7] rounded-2xl p-6 md:p-8 border-2 border-amber-100 shadow-sm flex-1 flex flex-col gap-6 relative transition-colors">
                        
                        <div class="flex items-center justify-between bg-white px-5 py-3 rounded-xl border border-gray-200 shadow-inner">
                            <span class="text-gray-600 font-bold text-2xl">目標字：</span>
                            <span id="info-char" class="font-bold text-6xl kaishu text-amber-700 bg-amber-50 px-6 py-2 rounded-xl shadow-sm border border-amber-200 inline-block transition-all hover:scale-105 cursor-pointer" onclick="playSound('pop')"></span>
                        </div>

                        <div class="flex flex-col items-start gap-3 w-full">
                            <span class="text-gray-600 font-bold text-xl pt-2">1. 找部首：</span>
                            <span id="game-status" class="text-base md:text-lg font-bold text-amber-600 bg-amber-100 px-4 py-2 rounded-full transition-colors duration-300 w-full text-center">選出對的部首解開防錯密碼！</span>
                            <div id="radical-options" class="flex gap-4 flex-wrap justify-center w-full mt-2">
                            </div>
                        </div>

                        <div class="flex flex-col items-start w-full transition-all duration-700 ease-in-out mt-4" id="components-section" style="opacity: 0.3; filter: grayscale(100%); pointer-events: none;">
                            <span class="text-gray-600 font-bold text-xl pt-2 mb-3">2. 拆字與防錯密碼：</span>
                            
                            <div class="w-full bg-white border-2 border-teal-200 rounded-2xl p-5 shadow-sm">
                                <div id="info-components" class="flex flex-wrap justify-center items-center gap-3 transition-all duration-300 mb-4 pb-4 border-b-2 border-dashed border-gray-200">
                                    <span class="text-3xl text-gray-400 kaishu font-bold">???</span>
                                </div>
                                
                                <div id="char-hint-box" class="hidden">
                                    <div class="flex items-start gap-3 bg-red-50 p-4 rounded-xl border border-red-200">
                                        <span class="text-3xl mt-1">🚨</span>
                                        <div>
                                            <span class="text-lg font-bold text-red-800 block mb-1">防錯密碼口訣</span>
                                            <p id="char-hint-text" class="text-lg text-gray-800 font-medium leading-relaxed tracking-wide"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    
                    <div class="mt-5 bg-blue-50 border-l-8 border-blue-400 p-5 rounded-xl shadow-sm transition-all duration-300">
                        <div id="quiz-message" class="text-blue-800 font-bold text-xl flex items-center gap-3 transition-all">
                            <span>💡</span> 點擊左邊「▶️ 播放」看筆順，或「✍️ 自己寫」拿星星！
                        </div>
                    </div>
                </div>
            </div>

            <!-- 第二區：詞語應用 -->
            <div class="w-full max-w-5xl flex flex-col gap-4">
                <div class="flex items-center gap-3 mb-2 px-2 border-b-4 border-amber-700 pb-2 inline-flex self-start">
                    <span class="text-4xl">📖</span>
                    <h2 class="text-3xl font-bold text-amber-900 tracking-wide">詞語全貌與應用</h2>
                </div>
                
                <div id="word-explanation" class="px-6 py-6 md:px-8 bg-[#fdf8ed] border-2 border-amber-200 rounded-3xl shadow-sm w-full transition-all hover:shadow-md mt-2">
                </div>

                <div id="word-advanced-usage" class="w-full bg-blue-50 border-2 border-blue-200 rounded-3xl p-5 md:p-8 shadow-sm hidden fade-in-up mt-2 transition-colors">
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 全域變數宣告區 ---
        let focusMode = false;
        let audioCtx = null;
        let soundEnabled = true;
        let writer = null;
        let activeWordBtn = null;
        let currentWord = "";
        let globalScore = 0;
        let sentenceAttemptCount = 0;
        let currentMistakes = 0;
        let usedHint = false;
        let currentFilter = 'all';

        const MAX_SCORE = 134; 
        const completedTasks = new Set();
        
        // 🌟 新增：連擊計數器
        let currentCombo = 0;

        // --- 感官友善模式切換 (Sensory-Friendly Focus Mode) ---
        window.toggleFocusMode = function(e) {
            e.stopPropagation();
            focusMode = !focusMode;
            const body = document.body;
            const btn = document.getElementById('focus-toggle');
            
            if (focusMode) {
                body.classList.add('focus-mode');
                btn.innerHTML = '🧘 專注';
                btn.classList.add('bg-white/80', 'text-amber-900', 'shadow-sm');
                btn.classList.remove('bg-white/20', 'text-white');
            } else {
                body.classList.remove('focus-mode');
                btn.innerHTML = '🎮 遊戲';
                btn.classList.remove('bg-white/80', 'text-amber-900', 'shadow-sm');
                btn.classList.add('bg-white/20', 'text-white');
            }
            
            btn.classList.add('pop');
            setTimeout(() => btn.classList.remove('pop'), 300);
        };

        // --- 音效系統 ---
        window.initAudio = function() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        };

        window.toggleSound = function(e) {
            e.stopPropagation();
            soundEnabled = !soundEnabled;
            document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
            document.getElementById('sound-toggle').classList.add('pop');
            setTimeout(() => document.getElementById('sound-toggle').classList.remove('pop'), 300);
        };

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') { 
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'wrong') { 
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'star') { 
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'pop') { 
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'reveal') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function showCheer() {
            const cheers = ["太神啦！🔥", "有料喔！😎", "超帥！⚡", "輕鬆秒殺！🎯", "繼續保持！💪"];
            const badge = document.getElementById('cheer-badge');
            badge.textContent = cheers[Math.floor(Math.random() * cheers.length)];
            badge.classList.remove('hidden');
            badge.classList.add('pop');
            setTimeout(() => {
                badge.classList.add('hidden');
                badge.classList.remove('pop');
            }, 2000);
        }

        // 🌟 新增：更新視覺進度條與連擊系統邏輯
        function updateProgress() {
            const progress = (globalScore / MAX_SCORE) * 100;
            document.getElementById('score-progress-bar').style.width = progress + '%';
        }

        window.updateCombo = function(isCorrect) {
            const badge = document.getElementById('combo-badge');
            const countDisplay = document.getElementById('combo-count');
            
            if (isCorrect) {
                currentCombo++;
                if (currentCombo >= 2) {
                    countDisplay.textContent = currentCombo;
                    badge.classList.remove('hidden', 'pop');

        window.filterDifficulty = function(level, btn) {

            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.remove('bg-amber-200', 'text-amber-900', 'border-amber-300', 'shadow-sm');
                b.classList.add('text-gray-500', 'border-transparent');
            });
            btn.classList.add('bg-amber-200', 'text-amber-900', 'border-amber-300', 'shadow-sm');

            renderWordList();
        };

        function renderWordList() {
            const listContainer = document.getElementById('word-list');
            listContainer.innerHTML = '';
            
            const filteredWords = currentFilter === 'all' ? wordDataList : wordDataList.filter(w => w.level === currentFilter);
            
            if (activeWordBtn && activeWordBtn.parentNode) {
                activeWordBtn.classList.remove('bg-amber-200', 'border-amber-600', 'shadow-sm');
                activeWordBtn = null;
            }

            filteredWords.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'flex-shrink-0 lg:w-full'; 
                
                const btn = document.createElement('button');
                btn.className = 'w-full whitespace-nowrap lg:whitespace-normal text-center lg:text-left px-4 py-2 lg:py-3 rounded-xl text-base lg:text-lg font-bold text-amber-900 transition-all hover:bg-amber-100 hover:scale-[1.02] focus:outline-none border-2 border-transparent flex justify-between items-center';
                
                let stars = '';
                for(let i=0; i<item.level; i++) stars += '⭐';
                btn.innerHTML = `<span>${item.word}</span> <span class="text-xs opacity-70">${stars}</span>`;
                
                btn.onclick = () => {
                    playSound('pop');
                    if(activeWordBtn) {
                        activeWordBtn.classList.remove('bg-amber-200', 'border-amber-600', 'shadow-sm');
                    }
                    btn.classList.add('bg-amber-200', 'border-amber-600', 'shadow-sm');
                    activeWordBtn = btn;
                    showVisualIntro(item.word);
                };
                li.appendChild(btn);
                listContainer.appendChild(li);

                if(index === 0) setTimeout(() => btn.click(), 50);
            });
        }

        function init() {
            renderWordList();
        }

        window.checkSentence = function(btn, option, answer, feedbackText) {
            if (btn.disabled) return;
            const container = document.getElementById('sentence-options');
            const feedback = document.getElementById('sentence-feedback');
            const iconSpan = btn.querySelector('.icon-span');

            if (option === answer) {
                playSound('correct');
                updateCombo(true); // 🌟 記錄連擊
                
                if (!completedTasks.has(`sentence_${currentWord}`)) {
                    completedTasks.add(`sentence_${currentWord}`);
                    addScore(1);
                    feedback.innerHTML = `✨ ${feedbackText} <span class="text-yellow-500 float-right">⭐ +1</span>`;
                } else {
                    feedback.innerHTML = `✨ ${feedbackText}`;
                }

                showCheer();
                if(iconSpan) iconSpan.textContent = '✅';
                btn.className = "w-full text-left px-5 py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-md text-lg md:text-xl pop transition-all border-2 border-emerald-600 flex items-center gap-3";
                feedback.className = "mt-5 text-xl md:text-2xl font-bold p-4 rounded-xl border-2 border-emerald-300 bg-emerald-100 text-emerald-900 pop transition-all block shadow-sm";

                Array.from(container.children).forEach(child => {
                    child.disabled = true;
                    if(child !== btn) {
                        child.className = "w-full text-left px-5 py-4 bg-gray-200 text-gray-400 font-bold rounded-xl text-lg md:text-xl transition-all opacity-50 cursor-not-allowed flex items-center gap-3";
                    }
                });
            } else {
                playSound('wrong');
                updateCombo(false); // 🌟 答錯中斷連擊
                if(iconSpan) iconSpan.textContent = '❌';
                btn.className = "w-full text-left px-5 py-4 bg-gray-200 text-gray-400 font-bold rounded-xl text-lg md:text-xl shake transition-all opacity-50 cursor-not-allowed flex items-center gap-3";
                btn.disabled = true;
                
                sentenceAttemptCount++;
                
                // 🌟 ZPD 動態難度調節
                if (sentenceAttemptCount === 1) {
                    let hiddenOne = false;
                    Array.from(container.children).forEach(child => {
                        const childOpt = child.getAttribute('data-opt');
                        if (childOpt !== answer && childOpt !== option && !hiddenOne) {
                            child.classList.add('opacity-20', 'pointer-events-none');
                            hiddenOne = true;
                        }
                        if (childOpt === answer) {
                            child.classList.add('border-4', 'border-emerald-400');
                            const emojiSpan = child.querySelector('.sentence-emoji');
                            if(emojiSpan) emojiSpan.classList.add('scale-150', 'animate-bounce', 'transform', 'origin-right');
                        }
                    });
                    feedback.innerHTML = `🤔 不太對喔，我幫你刪掉一個錯誤選項，再看清楚提示試試看！`;
                    feedback.className = "mt-5 text-xl font-bold p-4 rounded-xl border-2 border-amber-300 bg-amber-50 text-amber-800 transition-all block shadow-sm pop";
                } else {
                    feedback.innerHTML = `🤔 還是不對喔，答案就在剩下的選項裡！`;
                    feedback.className = "mt-5 text-xl font-bold p-4 rounded-xl border-2 border-red-300 bg-red-50 text-red-800 transition-all block";
                }
            }
        };

        window.checkSemantic = function(btn, option, answer, feedbackText) {
            if (btn.disabled) return;
            const container = document.getElementById('semantic-options');
            const feedback = document.getElementById('semantic-feedback');

            if (option === answer) {
                playSound('correct');
                updateCombo(true); // 🌟 記錄連擊
                if (!completedTasks.has(`semantic_${currentWord}`)) {
                    completedTasks.add(`semantic_${currentWord}`);
                    addScore(1);
                    feedback.innerHTML = `✨ ${feedbackText} <span class="text-yellow-500 float-right">⭐ +1</span>`;
                } else {
                    feedback.innerHTML = `✨ ${feedbackText}`;
                }
                showCheer();
                btn.className = "px-6 py-3 bg-indigo-500 text-white font-bold rounded-xl shadow-md text-xl pop transition-all border-2 border-indigo-600";
                feedback.className = "mt-5 text-xl md:text-2xl font-bold p-4 rounded-xl border-2 border-indigo-300 bg-indigo-100 text-indigo-900 pop transition-all block shadow-sm";
                Array.from(container.children).forEach(child => {
                    child.disabled = true;
                    if(child !== btn) {
                        child.className = "px-6 py-3 bg-gray-200 text-gray-400 font-bold rounded-xl text-xl transition-all opacity-50 cursor-not-allowed";
                    }
                });
            } else {
                playSound('wrong');
                updateCombo(false); // 🌟 答錯中斷連擊
                btn.className = "px-6 py-3 bg-gray-200 text-gray-400 font-bold rounded-xl text-xl shake transition-all opacity-50 cursor-not-allowed";
                btn.disabled = true;
                feedback.innerHTML = `🤔 不太對喔，再想想看！`;
                feedback.className = "mt-5 text-xl font-bold p-4 rounded-xl border-2 border-red-300 bg-red-50 text-red-800 transition-all block";
            }
        };

            document.getElementById('learning-section').classList.remove('hidden');

        function setupLearningArea(word) {
            const display = document.getElementById('word-display');
            display.innerHTML = '';

            const expData = wordExplanations[word] || { text: '暫無解釋', icon: '💡' };
            
            expBox.innerHTML = `
                <div class="flex items-start md:items-center gap-5 justify-center md:justify-start">

                    <div class="text-left flex-1">
                        <span class="text-gray-800 text-2xl md:text-3xl font-bold tracking-wide leading-relaxed block">${expData.text}</span>
                    </div>
                </div>
            `;
            
            renderAdvancedUsage(word);

            [...word].forEach((char, index) => {
                const btn = document.createElement('button');
                btn.className = 'char-btn pb-2 border-b-8 border-transparent hover:text-red-600 transition-all focus:outline-none transform hover:-translate-y-1 duration-300';

                btn.onclick = () => {
                    playSound('pop');

        function selectChar(char, element) {
            document.querySelectorAll('.char-btn').forEach(btn => {
                btn.classList.remove('border-red-500', 'text-red-600');
            });
            if (element) {
                element.classList.add('border-red-500', 'text-red-600');
                element.classList.add('pop');
                setTimeout(() => element.classList.remove('pop'), 400);
            }

            const rightPanel = document.getElementById('right-info-panel');
            if (rightPanel) {
                rightPanel.classList.remove('fade-in-up');
                void rightPanel.offsetWidth; 
                rightPanel.classList.add('fade-in-up');
            }

            document.getElementById('info-char').textContent = char;
            const charData = dict[char] || { radical: '？', components: ['資料建設中'], hint: '暫無提示' };
            
            document.getElementById('components-section').style.opacity = '0.3';
            document.getElementById('components-section').style.filter = 'grayscale(100%)';
            document.getElementById('info-components').innerHTML = '<span class="text-3xl text-gray-400 kaishu font-bold">???</span>';
            document.getElementById('char-hint-box').classList.add('hidden');
            
            setupRadicalGame(charData.radical, charData.components, charData.hint);

            setQuizMessage('💡 點擊左邊「▶️ 播放」看筆順，或「✍️ 自己寫」拿 2 顆星星！⭐', 'blue');

            const canvas = document.getElementById('character-canvas');
            canvas.innerHTML = ''; 
            document.getElementById('success-animation').classList.add('hidden');
            document.getElementById('success-animation').classList.remove('star-animate');
            
            const canvasSize = window.innerWidth >= 768 ? 320 : 280;
            writer = HanziWriter.create('character-canvas', char, {
                width: canvasSize,
                height: canvasSize,
                padding: 20,
                strokeAnimationSpeed: 1.5,
                delayBetweenStrokes: 100,
                showOutline: true,
                strokeColor: '#b91c1c', // 保持主體為深紅色
                radicalColor: '#14b8a6', // 🌟 升級：將部首改為明亮的 teal-500，強烈視覺對比
                outlineColor: '#e5e7eb',
                drawingWidth: 30,
                charDataLoader: function(c, onComplete) {
                    fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data-tc@1.0.1/${c}.json`)
                        .then(res => res.ok ? res.json() : fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${c}.json`).then(r => r.json()))
                        .then(data => onComplete(data))
                        .catch(err => {
                            canvas.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-red-500 font-bold bg-white/80 text-xl">暫無此字筆順資料</div>';
                        });
                }
            });
        }

        function setupRadicalGame(correctRadical, componentsArray, hintText) {
            const optionsContainer = document.getElementById('radical-options');
            const statusText = document.getElementById('game-status');
            optionsContainer.innerHTML = '';
            statusText.textContent = '快找出這個字的部首！';
            statusText.className = 'text-base md:text-lg font-bold text-amber-600 bg-amber-100 px-4 py-2 rounded-full w-full text-center';

            if(correctRadical === '？') {
                optionsContainer.innerHTML = '<span class="text-gray-500 text-lg">暫無部首資料</span>';
                return;
            }

            let wrongOptions = [];
            while(wrongOptions.length < 2) {
                const random = commonRadicals[Math.floor(Math.random() * commonRadicals.length)];
                const baseCorrect = correctRadical.split(' ')[0]; 
                if(random !== baseCorrect && !wrongOptions.includes(random)) {
                    wrongOptions.push(random);
                }
            }

            let allOptions = [correctRadical, ...wrongOptions];
            allOptions.sort(() => Math.random() - 0.5);

            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                const displayOpt = opt.split(' ')[0]; 
                
                btn.className = 'w-20 h-20 md:w-24 md:h-24 text-4xl md:text-5xl kaishu font-bold bg-white border-2 border-gray-300 rounded-2xl shadow-sm hover:bg-gray-50 transition-all duration-300 focus:outline-none hover:-translate-y-1';
                btn.textContent = displayOpt;
                
                btn.onclick = function() {
                    if (opt === correctRadical) {
                        playSound('correct');
                        updateCombo(true); // 🌟 記錄連擊
                        this.className = 'w-20 h-20 md:w-24 md:h-24 text-4xl md:text-5xl kaishu font-bold bg-green-100 border-4 border-green-500 text-green-700 rounded-2xl shadow-md pop transition-all duration-300';
                        
                        const currentChar = document.getElementById('info-char').textContent;
                        if (!completedTasks.has(`radical_${currentChar}`)) {
                            completedTasks.add(`radical_${currentChar}`);
                            addScore(1);
                            statusText.innerHTML = '✨ 答對了！解鎖拆字與防錯密碼！ <span class="text-yellow-600">⭐ +1</span>';
                        } else {
                            statusText.innerHTML = '✨ 答對了！解鎖拆字與防錯密碼！';
                        }
                        
                        statusText.className = 'text-base md:text-lg font-bold text-green-800 bg-green-200 px-4 py-2 rounded-full pop transition-all w-full text-center';
                        unlockComponents(componentsArray, hintText);
                        
                        Array.from(optionsContainer.children).forEach(child => {
                            child.onclick = null;
                            if(child !== this) {
                                child.style.opacity = '0.4';
                                child.style.transform = 'scale(0.95)';
                                child.style.pointerEvents = 'none';
                            }
                        });
                    } else {
                        playSound('wrong');
                        updateCombo(false); // 🌟 答錯中斷連擊
                        this.className = 'w-20 h-20 md:w-24 md:h-24 text-4xl md:text-5xl kaishu font-bold bg-gray-100 border-2 border-gray-200 text-gray-400 rounded-2xl shake transition-all duration-300';
                        statusText.innerHTML = '🤔 不對喔，再試試！';
                        statusText.className = 'text-base md:text-lg font-bold text-red-600 bg-red-100 px-4 py-2 rounded-full transition-all w-full text-center';
                        setTimeout(() => this.classList.remove('shake'), 400);
                    }
                };
                optionsContainer.appendChild(btn);
            });
        }

        function unlockComponents(componentsArray, hintText) {
            const section = document.getElementById('components-section');
            const compContainer = document.getElementById('info-components');
            const hintBox = document.getElementById('char-hint-box');
            const hintTextEl = document.getElementById('char-hint-text');
            
            section.style.opacity = '1';
            section.style.filter = 'grayscale(0%)';
            
            compContainer.innerHTML = '';
            if(componentsArray && Array.isArray(componentsArray)){
                componentsArray.forEach((comp, index) => {
                    const span = document.createElement('span');
                    span.className = "text-4xl md:text-5xl text-teal-800 kaishu font-bold bg-teal-50 border-2 border-teal-200 px-4 py-2 rounded-xl shadow-sm";
                    span.textContent = comp;
                    compContainer.appendChild(span);
                    
                    if (index < componentsArray.length - 1) {
                        const plus = document.createElement('span');
                        plus.className = "text-3xl text-gray-400 font-bold self-center px-2";
                        plus.textContent = "+";
                        compContainer.appendChild(plus);
                    }
                });
            }

            if(hintText) {
                hintTextEl.textContent = hintText;
                hintBox.classList.remove('hidden');
                hintBox.classList.add('fade-in-up');
            }

            compContainer.classList.remove('pop');
            void compContainer.offsetWidth; 
            compContainer.classList.add('pop');
        }

        function addScore(points) {
            globalScore += points;
            if(globalScore > MAX_SCORE) globalScore = MAX_SCORE; 
            
            const display = document.getElementById('score-display');
            display.textContent = globalScore + " / " + MAX_SCORE;
            display.classList.add('pop');
            display.style.color = '#ca8a04'; 
            
            updateProgress(); // 🌟 更新進度條寬度

            setTimeout(() => {
                display.classList.remove('pop');
                display.style.color = '';
            }, 400);
        }

        function setQuizMessage(msg, colorType) {
            const msgBox = document.getElementById('quiz-message');
            const colorMap = {
                'blue': 'text-blue-800 bg-blue-50 border-blue-400',
                'teal': 'text-teal-800 bg-teal-50 border-teal-500',
                'red': 'text-red-700 bg-red-50 border-red-400',
                'green': 'text-green-800 bg-green-50 border-green-500'
            };
            msgBox.innerHTML = msg;
            msgBox.parentElement.className = `mt-5 border-l-8 p-5 rounded-r-xl shadow-sm transition-colors duration-300 ${colorMap[colorType].split(' ').slice(1).join(' ')}`;
            msgBox.className = `font-bold text-xl flex items-center gap-3 ${colorMap[colorType].split(' ')[0]}`;
        }

        window.playAnimation = function() {
            playSound('pop');
            if(writer) {
                writer.cancelQuiz();
                setQuizMessage('👀 看清楚，跟著動畫記筆順...', 'teal');
                writer.animateCharacter();
            }
        };

        window.startQuiz = function() {
            playSound('pop');
            if(writer) {
                currentMistakes = 0;
                usedHint = false;
                setQuizMessage('🎯 在田字格裡寫寫看！寫錯再試就好。完成可得 2 顆星星喔！⭐', 'teal');
                
                document.getElementById('success-animation').classList.add('hidden');
                document.getElementById('success-animation').classList.remove('star-animate');

                writer.quiz({
                    showHintAfterMisses: 3,
                    onMistake: function(strokeData) {
                        playSound('wrong');
                        updateCombo(false); // 🌟 寫錯中斷連擊
                        currentMistakes++;
                        if (currentMistakes >= 3 && !usedHint) {
                            usedHint = true;
                            setQuizMessage('💡 沒關係，跟著淡淡的底字描一次！(安慰獎1分)', 'blue');
                        } else if (!usedHint) {
                            setQuizMessage('💪 哎呀！筆畫順序不太對，再來一次！', 'red');
                        }
                    },
                    onCorrectStroke: function(strokeData) {
                        playSound('pop');
                        if (!usedHint) setQuizMessage('✅ 漂亮！繼續寫下一筆。', 'teal');
                    },
                    onComplete: function(summaryData) {
                        playSound('star');
                        
                        // 🌟 完美無失誤才算入連擊
                        if (currentMistakes === 0 && !usedHint) {
                            updateCombo(true);
                        }
                        
                        showCheer(); 
                        
                        const currentChar = document.getElementById('info-char').textContent;
                        if (!completedTasks.has(`write_${currentChar}`)) {
                            completedTasks.add(`write_${currentChar}`);
                            if (usedHint) {
                                addScore(1);
                                setQuizMessage('🌟 完成了！獲得 1 顆星星安慰獎！下次自己寫會拿到2顆喔！', 'blue');
                            } else {
                                addScore(2);
                                setQuizMessage('🌟 完美通關！自己寫出來了，獲得 2 顆星星！', 'green');
                            }
                        } else {
                            setQuizMessage('🌟 完美通關！字寫得太漂亮了！', 'green');
                        }
                        
                        const starAnim = document.getElementById('success-animation');
                        starAnim.classList.remove('hidden');
                        starAnim.classList.remove('star-animate');
                        void starAnim.offsetWidth; 
                        starAnim.classList.add('star-animate');
                    }
                });
            }
        };

        window.onload = init;
    </script>
